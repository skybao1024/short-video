services:
  # FastAPI应用
  app:
    build: .
    container_name: ${PROJECT_NAME:-demo}-app
    restart: unless-stopped
    environment:
      - ENV=production
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "127.0.0.1:${API_PORT:-8001}:${API_PORT:-8001}"
    volumes:
      - ./logs:/app/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8001}/api/v1/config/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  celery-worker:
    build: .
    container_name: ${PROJECT_NAME:-demo}-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./logs:/app/logs
    networks:
      - app-network
    depends_on:
      - app
    profiles:
      - worker

  # Celery Beat (调度器)
  celery-beat:
    build: .
    container_name: ${PROJECT_NAME:-demo}-celery-beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./logs:/app/logs
      - ./celerybeat-schedule.db:/app/celerybeat-schedule.db
    networks:
      - app-network
    depends_on:
      - app
    profiles:
      - worker

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-demo}-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # SECURITY: Bind Redis to localhost only to prevent external access
    ports:
      - "127.0.0.1:${REDIS_EXTERNAL_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - local-infra

  # Nginx反向代理 (默认启用)
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-demo}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl  # SSL证书目录(可选)
    networks:
      - app-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/config/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - local-infra

  # Flower - Celery监控(可选)
  flower:
    build: .
    container_name: ${PROJECT_NAME:-demo}-flower
    restart: unless-stopped
    # SECURITY: Enable Flower basic auth to prevent unauthorized access
    command: celery -A app.core.celery_app flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    # SECURITY: Bind Flower to localhost only
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    env_file:
      - ${ENV_FILE:-.env}
    networks:
      - app-network
    depends_on:
      - redis
      - celery-worker
    profiles:
      - monitoring

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
