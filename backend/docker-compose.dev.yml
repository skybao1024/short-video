# 开发环境专用配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ${PROJECT_NAME:-app}:dev
    ports:
      - "${API_PORT:-8001}:${API_PORT:-8001}"
    environment:
      - ENV=development
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs

  # Celery Worker - reuse dev image (override base build to prevent separate build)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ${PROJECT_NAME:-app}:dev
    environment:
      - ENV=development
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - app-network

  # Celery Beat - reuse dev image (override base build to prevent separate build)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ${PROJECT_NAME:-app}:dev
    depends_on:
      - app

  # Flower - reuse dev image (override base build to prevent separate build)
  flower:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ${PROJECT_NAME:-app}:dev
    depends_on:
      - app
      
  # 在开发环境中禁用Nginx服务
  nginx:
    profiles:
      - donotstart